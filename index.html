<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabaseUrl = "https://sxtgzpzneqyaxljpkqmb.supabase.co";
const supabaseAnonKey = "sb_publishable_mrrBNQvb9QKx4pfkSMoSuQ_IxtFSaaX";
const supabase = createClient(supabaseUrl, supabaseAnonKey);

// ---------- Constantes torneo ----------
const TOTAL_RONDAS = 9;
const TOTAL_PAREJAS = 26;
const SAVE_DEBOUNCE_MS = 350;
const MAX_SCORE = 99.99;

// ---------- Estado ----------
const state = {
  resultados: {},          // { ronda -> { partidoIdx -> [scoreA, scoreB] } }
  currentView: { type: "ronda", value: 1 },
  channelSubscribed: false,
  pendingSaves: new Map(),
  loaded: false,
};

// ---------- Helpers ----------
const keyFor = (ronda, partidoIdx) => `${ronda}:${partidoIdx}`;

const sanitizeScore = (raw) => {
  if (raw === "" || raw === null || raw === undefined) return null;
  const cleaned = raw.toString().replace(",", ".").trim();
  const n = parseFloat(cleaned);
  if (isNaN(n)) return null;
  return Math.max(0, Math.min(MAX_SCORE, n));
};

// ---------- Carga inicial ----------
const fetchResultados = async () => {
  const { data, error } = await supabase.from("resultados").select("*");
  if (error) throw error;
  const map = {};
  data.forEach((row) => {
    const r = row.ronda.toString();
    if (!map[r]) map[r] = {};
    map[r][row.partido_idx] = row.scores;
  });
  state.resultados = map;
};

const subscribeRealtime = () => {
  if (state.channelSubscribed) return;
  state.channelSubscribed = true;
  supabase
    .channel("resultados-changes")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "resultados" },
      (payload) => applyRemoteChange(payload)
    )
    .subscribe();
};

const applyRemoteChange = (payload) => {
  const row = payload.new || payload.old;
  if (!row) return;
  const r = row.ronda?.toString();
  if (!r) return;
  if (payload.eventType === "DELETE") {
    if (state.resultados[r]) delete state.resultados[r][row.partido_idx];
  } else {
    if (!state.resultados[r]) state.resultados[r] = {};
    state.resultados[r][row.partido_idx] = row.scores;
  }
  // No re-renderizamos si hay un input enfocado (preserva la edición en curso)
  const activeIsInput = document.activeElement && document.activeElement.tagName === "INPUT";
  if (activeIsInput) return;
  if (state.currentView.type === "ronda" && state.currentView.value.toString() === r) {
    renderRonda(state.currentView.value);
  } else if (state.currentView.type === "ranking") {
    renderClasificacion();
  }
};

const startApp = async () => {
  // 1) Render INMEDIATO con datos vacíos para UI instantánea
  initButtons();
  renderRonda(1);
  // 2) En paralelo: fetch y suscripción realtime
  try {
    await fetchResultados();
    if (state.currentView.type === "ronda") renderRonda(state.currentView.value);
    else renderClasificacion();
  } catch (err) {
    console.warn("[Machorras] No se pudo cargar resultados:", err?.message || err);
  }
  state.loaded = true;
  subscribeRealtime();
};

const initAuth = async () => {
  startApp();
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) await supabase.auth.signInAnonymously();
  } catch (err) {
    console.warn("[Machorras] Auth anónima falló, continuamos en modo lectura:", err?.message || err);
  }
};

// (initAuth() se invoca al final del script, cuando todas las constantes
//  parejas / rondasData ya están inicializadas. Hacerlo antes causaría
//  ReferenceError por Temporal Dead Zone.)

// ---------- Acciones expuestas ----------
window.setCurrentView = (type, value) => {
  if (type === "ronda") {
    state.currentView = { type: "ronda", value };
    renderRonda(value);
  } else {
    state.currentView = { type: "ranking" };
    renderClasificacion();
  }
};

window.saveScore = (ronda, partidoIdx, parejaPos, value) => {
  const valFloat = sanitizeScore(value);
  const rKey = ronda.toString();
  if (!state.resultados[rKey]) state.resultados[rKey] = {};
  if (!state.resultados[rKey][partidoIdx]) state.resultados[rKey][partidoIdx] = [null, null];
  state.resultados[rKey][partidoIdx][parejaPos] = valFloat;

  const k = keyFor(ronda, partidoIdx);
  const prev = state.pendingSaves.get(k);
  if (prev?.timer) clearTimeout(prev.timer);
  const timer = setTimeout(async () => {
    state.pendingSaves.delete(k);
    try {
      await supabase.from("resultados").upsert(
        { ronda, partido_idx: partidoIdx, scores: state.resultados[rKey][partidoIdx] },
        { onConflict: "ronda,partido_idx" }
      );
    } catch (err) {
      console.warn("[Machorras] Error guardando resultado:", err?.message || err);
    }
  }, SAVE_DEBOUNCE_MS);
  state.pendingSaves.set(k, { timer });
};

window.clearMatch = async (ronda, partidoIdx) => {
  const rKey = ronda.toString();
  if (!state.resultados[rKey]) state.resultados[rKey] = {};
  state.resultados[rKey][partidoIdx] = [null, null];
  const k = keyFor(ronda, partidoIdx);
  const prev = state.pendingSaves.get(k);
  if (prev?.timer) clearTimeout(prev.timer);
  state.pendingSaves.delete(k);
  try {
    await supabase.from("resultados").upsert(
      { ronda, partido_idx: partidoIdx, scores: [null, null] },
      { onConflict: "ronda,partido_idx" }
    );
  } catch (err) {
    console.warn("[Machorras] Error al borrar partido:", err?.message || err);
  }
  renderRonda(ronda);
};

// ---------- 26 PAREJAS ----------
const parejas = {
  1:  "LAS REPES",
  2:  "MATCH Y CHISME",
  3:  "PA LAS RISAS",
  4:  "PAUSA",
  5:  "PELOTUDAS",
  6:  "RESACÓN EN LA PISTA",
  7:  "ECLIPSE",
  8:  "VIR & JESS",
  9:  "LAS TWINS",
  10: "LAS DIVAS",
  11: "SÍ A TODO",
  12: "CRISTILI",
  13: "ZIP ZAP",
  14: "LAS ENRALADAS",
  15: "BOLBORETAS",
  16: "KORA",
  17: "LA GRACIOSA",
  18: "KIWITERAS",
  19: "EQUIPAZO MG",
  20: "GOLPE CON MELODÍA",
  21: "NO SMASH DÚO",
  22: "TEAM MAD",
  23: "SIN PIEDAD",
  24: "LAS R&R",
  25: "M&H",
  26: "LAS BAIFAS"
};

// ---------- 9 RONDAS · 13 PARTIDOS/RONDA (117 partidos únicos, 0 enfrentamientos repetidos) ----------
// Formato: [pista, parejaA_id, parejaB_id]
const rondasData = {
  1: { cruces: [[1,1,2],[2,3,4],[3,5,6],[4,7,8],[5,9,10],[6,11,12],[7,13,14],[8,15,16],[9,17,18],[10,19,20],[11,21,22],[12,23,24],[13,25,26]] },
  2: { cruces: [[1,1,6],[2,4,22],[3,23,3],[4,2,12],[5,5,11],[6,7,9],[7,8,10],[8,16,20],[9,18,13],[10,15,24],[11,17,26],[12,19,25],[13,14,21]] },
  3: { cruces: [[1,18,10],[2,1,8],[3,4,12],[4,6,11],[5,2,9],[6,5,7],[7,23,22],[8,13,20],[9,16,24],[10,14,26],[11,15,25],[12,17,3],[13,19,21]] },
  4: { cruces: [[1,1,11],[2,12,9],[3,10,7],[4,8,5],[5,6,2],[6,4,13],[7,23,26],[8,24,25],[9,22,3],[10,20,21],[11,18,19],[12,16,17],[13,14,15]] },
  5: { cruces: [[1,6,9],[2,8,12],[3,18,11],[4,1,10],[5,23,7],[6,2,5],[7,13,22],[8,20,24],[9,4,26],[10,16,25],[11,14,3],[12,15,21],[13,17,19]] },
  6: { cruces: [[1,1,12],[2,10,11],[3,8,9],[4,6,7],[5,4,5],[6,23,2],[7,22,26],[8,13,24],[9,20,25],[10,18,3],[11,16,21],[12,14,19],[13,15,17]] },
  7: { cruces: [[1,23,18],[2,1,5],[3,2,8],[4,6,10],[5,7,12],[6,9,11],[7,13,16],[8,14,4],[9,15,20],[10,17,22],[11,19,24],[12,21,26],[13,3,25]] },
  8: { cruces: [[1,1,9],[2,11,7],[3,12,5],[4,10,2],[5,8,23],[6,18,6],[7,13,25],[8,26,3],[9,24,21],[10,22,19],[11,20,17],[12,4,15],[13,16,14]] },
  9: { cruces: [[1,1,7],[2,9,5],[3,11,2],[4,12,6],[5,10,4],[6,8,18],[7,25,21],[8,13,3],[9,26,19],[10,24,17],[11,22,15],[12,20,14],[13,23,16]] }
};

// ---------- Render ----------
function initButtons() {
  const container = document.getElementById("buttons-rondas");
  container.innerHTML = "";
  const frag = document.createDocumentFragment();
  for (let i = 1; i <= TOTAL_RONDAS; i++) {
    const btn = document.createElement("button");
    btn.id = `btn-${i}`;
    btn.type = "button";
    btn.setAttribute("aria-label", `Ronda ${i}`);
    btn.onclick = () => window.setCurrentView("ronda", i);
    btn.className = "btn-ronda-base";
    btn.innerText = `R${i}`;
    frag.appendChild(btn);
  }
  container.appendChild(frag);
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

function renderRonda(num) {
  const container = document.getElementById("main-content");
  const data = rondasData[num];
  const rKey = num.toString();
  const parts = [`<div class="animate-fade-in pb-10">`];

  data.cruces.forEach((cruce, idx) => {
    const [pista, parejaA_id, parejaB_id] = cruce;
    const mS = (state.resultados[rKey] && state.resultados[rKey][idx]) ? state.resultados[rKey][idx] : [null, null];
    const s1 = (mS[0] !== null && mS[0] !== undefined) ? mS[0] : "";
    const s2 = (mS[1] !== null && mS[1] !== undefined) ? mS[1] : "";

    parts.push(`
      <div class="match-card">
        <div class="flex justify-between items-center mb-5">
            <span class="pista-label-pro">PISTA ${pista}</span>
            <button type="button" class="reset-btn" aria-label="Borrar resultado" onclick="window.clearMatch(${num},${idx})">BORRAR</button>
        </div>
        <div class="flex items-center justify-between mb-4">
          <span class="team-name">${escapeHtml(parejas[parejaA_id])}</span>
          <input type="number" step="0.01" min="0" max="${MAX_SCORE}" inputmode="decimal" placeholder="-" aria-label="Puntos ${escapeHtml(parejas[parejaA_id])}" value="${s1}" oninput="window.saveScore(${num},${idx},0,this.value)">
        </div>
        <div class="flex items-center justify-between">
          <span class="team-name">${escapeHtml(parejas[parejaB_id])}</span>
          <input type="number" step="0.01" min="0" max="${MAX_SCORE}" inputmode="decimal" placeholder="-" aria-label="Puntos ${escapeHtml(parejas[parejaB_id])}" value="${s2}" oninput="window.saveScore(${num},${idx},1,this.value)">
        </div>
      </div>`);
  });
  parts.push("</div>");
  container.innerHTML = parts.join("");
  updateNavUI(num);
}

function renderClasificacion() {
  const container = document.getElementById("main-content");
  const stats = {};
  for (let i = 1; i <= TOTAL_PAREJAS; i++) {
    stats[i] = { nombre: parejas[i], total: 0, jugados: 0 };
  }

  for (const rKey of Object.keys(state.resultados)) {
    const ronda = state.resultados[rKey];
    if (!rondasData[rKey]) continue;
    for (const pIdx of Object.keys(ronda)) {
      const cruce = rondasData[rKey].cruces[pIdx];
      if (!cruce) continue;
      const [, parejaA_id, parejaB_id] = cruce;
      const s = ronda[pIdx];
      if (!s) continue;
      if (s[0] !== null && s[0] !== undefined) {
        stats[parejaA_id].total += s[0]; stats[parejaA_id].jugados++;
      }
      if (s[1] !== null && s[1] !== undefined) {
        stats[parejaB_id].total += s[1]; stats[parejaB_id].jugados++;
      }
    }
  }

  const sorted = Object.values(stats).sort((a, b) => b.total - a.total);
  const rows = sorted.map((p, i) => {
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : i + 1;
    const puntosVisuales = p.total.toFixed(2).replace(".", ",");
    return `<tr><td class="w-10 text-center font-black">${medal}</td><td class="font-bold text-sm uppercase"><span class="no-link">${escapeHtml(p.nombre)}</span></td><td class="text-center opacity-40 text-xs">${p.jugados}</td><td class="text-center font-black text-white text-xl pts-cell">${puntosVisuales}</td></tr>`;
  }).join("");

  container.innerHTML = `<div class="ranking-container animate-fade-in"><table><thead><tr><th>#</th><th>PAREJA</th><th>PJ</th><th class="text-center">PTS</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  updateNavUI("ranking");
}

function updateNavUI(active) {
  document.querySelectorAll(".btn-ronda-base").forEach((b) => b.classList.remove("active-ronda"));
  const activeBtn = document.getElementById(active === "ranking" ? "btn-ranking" : `btn-${active}`);
  if (activeBtn) activeBtn.classList.add("active-ronda");
}

// ---------- Arranque ----------
// Invocado al final, tras todas las declaraciones const, para evitar TDZ.
initAuth();
</script>

input::placeholder { color: rgba(14, 77, 42, 0.3); font-weight: 700; }
input:focus {
    outline: none;
    border-color: var(--forest) !important;
    background: var(--paper) !important;
    box-shadow: 0 0 0 4px rgba(14, 77, 42, 0.1), inset 0 1px 2px rgba(7, 51, 27, 0.04);
}

.reset-btn {
    color: var(--forest-soft);
    opacity: 0.55;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    border: none;
    background: transparent;
    cursor: pointer;
    transition: opacity 0.25s var(--ease-soft), color 0.25s var(--ease-soft);
    text-transform: uppercase;
}
.reset-btn:hover { opacity: 1; color: var(--forest); }

/* ── RANKING ── */
.ranking-container {
    background:
        linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 30%),
        var(--paper);
    border-radius: 1.4rem;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    margin-bottom: 2rem;
    border: 1px solid var(--paper-edge);
}
.ranking-container table { width: 100%; border-collapse: collapse; }
.ranking-container td {
    padding: 18px 14px;
    border-bottom: 1px solid rgba(14, 77, 42, 0.07);
    color: var(--forest);
}
.ranking-container tr:last-child td { border-bottom: none; }
.ranking-container tr:hover td { background: rgba(14, 77, 42, 0.025); }
.ranking-container th {
    padding: 14px;
    font-size: 9px;
    opacity: 0.55;
    letter-spacing: 0.25em;
    color: var(--forest);
    font-weight: 800;
    text-transform: uppercase;
    background: rgba(14, 77, 42, 0.04);
}
.no-link { color: var(--forest) !important; }
.pts-cell {
    text-align: center !important;
    color: var(--forest) !important;
    font-feature-settings: "tnum";
    font-family: 'Fira Sans', sans-serif;
    font-weight: 900;
    font-size: 22px !important;
}

/* ── ANIM ── */
.animate-fade-in {
    animation: fadeIn 0.55s var(--ease) both;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}
.match-card:nth-child(2)  { animation-delay: 0.04s; }
.match-card:nth-child(3)  { animation-delay: 0.07s; }
.match-card:nth-child(4)  { animation-delay: 0.10s; }
.match-card:nth-child(5)  { animation-delay: 0.13s; }
.match-card:nth-child(6)  { animation-delay: 0.16s; }
.match-card:nth-child(7)  { animation-delay: 0.19s; }
.match-card:nth-child(8)  { animation-delay: 0.22s; }
.match-card:nth-child(9)  { animation-delay: 0.25s; }
.match-card:nth-child(10) { animation-delay: 0.28s; }
.match-card:nth-child(11) { animation-delay: 0.31s; }
.match-card:nth-child(12) { animation-delay: 0.34s; }
.match-card:nth-child(13) { animation-delay: 0.37s; }

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
}
</style>
</head>
<body>
  <header class="header-main">
    <div class="logo-box">
      <img src="logo.jpg" alt="Logo Machorras" onerror="this.style.display='none'">
    </div>
    <span class="txt-green">AMERICANO</span>
    <h1 class="txt-logo">MACHORRAS</h1>
  </header>

  <nav class="nav-box" aria-label="Navegación de rondas">
    <div class="nav-scroll" id="buttons-rondas"></div>
    <button type="button" onclick="window.setCurrentView('ranking')" id="btn-ranking" class="btn-ronda-base w-full mt-4 uppercase tracking-[0.2em]" aria-label="Ver ranking">Ranking</button>
  </nav>

  <main id="main-content" class="p-4"></main>
</body>
</html>
